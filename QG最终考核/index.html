<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QG团队协作平台</title>
    <link rel="stylesheet" href="styles.css">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
</head>
<body>
    <!-- 主容器内容 -->
    <div id="app">
        <!-- 登录/注册页面 -->
        <div id="auth-container" class="container">
            <div class="auth-card">
                <h2>QG团队协作平台</h2>
                <!-- 登录/注册选项卡 -->
                <div class="auth-tabs">
                    <button id="login-tab" class="active">登录</button>
                    <button id="register-tab">注册</button>
                </div>

                <!-- 登录表单 -->
                <div id="login-form">
                    <div class="form-group">
                        <label>用户名/邮箱/手机号</label>
                        <input type="text" id="login-username" placeholder="请输入用户名、邮箱或手机号">
                    </div>
                    <div class="form-group" style="position: relative;">
                        <label>密码</label>
                        <input type="password" id="login-password" placeholder="请输入密码">
                        <!-- 密码显示/隐藏切换按钮 -->
                        <button type="button" id="toggle-password" style="position: absolute; right: 10px; top: 38px; background: none; border: none; cursor: pointer;">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                    <!-- 记住密码选项 -->
                    <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 15px; width: 100%; justify-content: flex-start;">
                        <input type="checkbox" id="remember-me" style="margin: 0; flex-shrink: 0; width: auto;">
                        <label for="remember-me" style="font-size: 12px; color: #666; margin: 0; white-space: nowrap; flex-shrink: 0;">记住密码</label>
                    </div>
                    <!-- 测试账号提示 -->
                    <p style="font-size: 12px; color: #666; margin-bottom: 10px; text-align: center;">测试账号：admin / admin</p>
                    <!-- 注册和忘记密码链接 -->
                    <p style="font-size: 12px; color: #666; margin-bottom: 10px; text-align: center;">第一次登录，请<a href="#" onclick="document.getElementById('register-tab').click(); return false;">注册</a></p>
                    <p style="font-size: 12px; color: #666; margin-bottom: 15px; text-align: center;">忘记密码？<a href="#" id="forgot-password-link" style="color: #667eea;">重置密码</a></p>
                    <button id="login-btn" class="primary-btn">登录</button>  
                </div>

                <!-- 注册表单 -->
                <div id="register-form" style="display: none;">
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" id="register-username" placeholder="请输入用户名">
                    </div>
                    <div class="form-group">
                        <label>邮箱</label>
                        <input type="email" id="register-email" placeholder="请输入邮箱">
                    </div>
                    <div class="form-group">
                        <label>手机号</label>
                        <input type="tel" id="register-phone" placeholder="请输入手机号">
                    </div>
                    <div class="form-group" style="position: relative;">
                        <label>密码</label>
                        <input type="password" id="register-password" placeholder="请输入密码">
                        <!-- 密码显示/隐藏切换按钮 -->
                        <button type="button" id="toggle-register-password" style="position: absolute; right: 10px; top: 38px; background: none; border: none; cursor: pointer;">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                        <!-- 密码强度显示区域 -->
                        <div id="password-strength" style="margin-top: 5px;">  
                            <div class="strength-bar" style="height: 5px; background-color: #e0e0e0; border-radius: 3px; overflow: hidden;">
                                <div class="strength-fill" style="height: 100%; width: 0%; background-color: #dc3545; transition: width 0.3s ease, background-color 0.3s ease;"></div>
                            </div>
                            <span class="strength-text" style="font-size: 12px; color: #666; display: block; margin-top: 3px; transition: color 0.3s ease;">密码强度：弱</span>
                        </div>
                    </div>
                    <div class="form-group" style="position: relative;">
                        <label>确认密码</label>
                        <input type="password" id="register-confirm" placeholder="请确认密码">
                        <!-- 确认密码显示/隐藏切换按钮 -->
                        <button type="button" id="toggle-confirm-password" style="position: absolute; right: 10px; top: 38px; background: none; border: none; cursor: pointer;">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                    <div class="form-group">
                        <label>角色</label>
                        <select id="register-role">
                            <option value="member">普通成员</option>
                            <option value="leader">项目组长</option>
                            <option value="admin">管理员</option>
                        </select>
                    </div>
                    <button id="register-btn" class="primary-btn">注册</button> 
                </div>

                <!-- 忘记密码表单 -->
                <div id="forgot-password-form" style="display: none;">
                    <div class="form-group">
                        <label>用户名/邮箱/手机号</label>
                        <input type="text" id="forgot-username" placeholder="请输入用户名、邮箱或手机号">
                    </div>
                    <button id="send-reset-code-btn" class="primary-btn" style="margin-bottom: 10px;">发送验证码</button>

                    <div id="reset-code-section" style="display: none;">
                        <div class="form-group">
                            <label>验证码</label>
                            <input type="text" id="reset-code" placeholder="请输入验证码">
                        </div>
                        <div class="form-group">
                            <label>新密码</label>
                            <input type="password" id="new-password" placeholder="请输入新密码">
                        </div>
                        <div class="form-group">
                            <label>确认新密码</label>
                            <input type="password" id="confirm-new-password" placeholder="请确认新密码">
                        </div>
                        <button id="reset-password-btn" class="primary-btn" style="margin-bottom: 10px;">重置密码</button>
                    </div>

                    <p style="font-size: 12px; color: #666; text-align: center;"><a href="#" id="back-to-login-link" style="color: #667eea;">返回登录</a></p>  
                </div>
            </div>
        </div>

        <!-- 主应用界面 -->
        <div id="app-container" style="display: none;">
            <!-- 顶部导航栏 -->
            <header id="navbar">
                <div class="logo">QG协作平台</div>
                <!-- 导航链接 -->
                <div class="nav-links">
                    <a href="#" id="nav-projects">项目</a>
                    <a href="#" id="nav-tasks">任务</a>
                    <a href="#" id="nav-teams">团队</a>
                    <a href="#" id="nav-branches">分支</a>
                    <a href="#" id="nav-notifications">通知</a>
                </div>
                <!-- 用户信息 -->
                <div class="user-info">
                    <span id="user-role" style="background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 4px 10px; border-radius: 12px; font-size: 12px; margin-right: 10px;">角色</span>
                    <span id="user-name">用户名</span>
                    <button id="logout-btn">退出</button>
                </div>
            </header>

            <!-- 内容区域 -->
            <div class="content-wrapper">
                <!-- 左侧边栏 - 任务列表 -->
                <aside id="sidebar">
                    <div class="sidebar-section">
                        <h3>任务</h3>
                        <!-- 任务列表将动态生成 -->
                    </div>
                </aside>

                <!-- 主内容区域 -->
                <main id="content">
                    <!-- 内容将根据当前页面动态生成 -->
                    <div id="dashboard">
                        <h2>欢迎使用QG团队协作平台</h2>
                        <p>选择一个项目开始工作，或创建新的项目。</p>
                    </div>
                </main>

                <!-- 右侧边栏 - 项目列表 -->
                <aside id="right-sidebar">
                    <div class="sidebar-section">
                        <h3>项目</h3>
                        <!-- 项目列表 -->
                        <ul id="project-list">
                            <!-- 项目列表将动态生成 -->
                        </ul>
                        <!-- 创建项目按钮 -->
                        <button id="create-project-btn" class="secondary-btn">创建项目</button>
                    </div>
                </aside>
            </div>
        </div>
    </div>

    <!-- 主应用脚本 -->
    <script type="module" src="js/app.js?v=2.0"></script>
</body>
</html>
